            ['funny', 'おもしろい', '🤣', 3], ['great', 'すごい', '🌟', 3], ['green', 'みどり', '🟩', 3], ['happy', 'ハッピー', '😆', 3],
            ['heavy', 'おもい', '🏋️', 3], ['human', 'にんげん', '🧑', 3], ['large', 'おおきい', '🐳', 3], ['light', 'かるい', '🪶', 3],
            ['lucky', 'ラッキー', '🤞', 3], ['noisy', 'うるさい', '🎺', 3], ['proud', 'ほこらしい', '😤', 3], ['quick', 'すばやい', '⚡', 3],
            ['quiet', 'しずか', '🤫', 3], ['ready', 'じゅんびOK', '👌', 3], ['right', 'みぎ', '➡️', 3], ['rough', 'ざらざら', '🌵', 3],
            ['round', 'まるい', '⚪', 3], ['sharp', 'するどい', '🔪', 3], ['short', 'みじかい', '📏', 3], ['silly', 'おばか', '🤪', 3],
            ['small', 'ちいさい', '🐁', 3], ['smart', 'あたまいい', '🧠', 3], ['sorry', 'ごめん', '🙇', 3], ['sour', 'すっぱい', '🍋', 3],
            ['steep', 'きゅう', '📉', 3], ['sweet', 'あまい', '🍬', 3], ['thick', 'あつい', '📚', 3], ['tired', 'つかれた', '😫', 3],
            ['tough', 'タフ', '💪', 3], ['white', 'しろい', '⬜', 3], ['wrong', 'まちがい', '❌', 3], ['young', 'わかい', '👶', 3],
            ['pretty', 'かわいい', '🎀', 3], ['strong', 'つよい', '💪', 3], ['yellow', 'きいろ', '🟨', 3], ['sleepy', 'ねむい', '😪', 3],
            ['hungry', 'お腹すいた', '😋', 3], ['thirsty', '喉かわいた', '🥛', 3], ['orange', 'オレンジ', '🟧', 3], ['purple', 'むらさき', '🟪', 3],
        ];

        const generateData = (raw, type) => raw.map((item, index) => ({
            id: `${type}-${index}`,
            front: item[0],
            back: item[1],
            speakText: item[0],
            emoji: item[2],
            level: item[3],
            type: type
        }));

        const DATA_SETS = {
            alphabet: generateData(RAW_ALPHA, 'alphabet'),
            noun: generateData(RAW_NOUNS, 'noun'),
            verb: generateData(RAW_VERBS, 'verb'),
            adjective: generateData(RAW_ADJECTIVES, 'adjective')
        };

        const COLORS = [
            'bg-blue-500', 'bg-red-400', 'bg-green-400', 
            'bg-yellow-400', 'bg-purple-400', 'bg-pink-400', 'bg-orange-400', 'bg-teal-400',
            'bg-indigo-400', 'bg-rose-400', 'bg-cyan-400', 'bg-emerald-400'
        ];

        // --- メインアプリコンポーネント ---
        const App = () => {
            const [mode, setMode] = useState('menu');
            const [currentItem, setCurrentItem] = useState(null);
            const [isFlipped, setIsFlipped] = useState(false);
            const [isSoundOn, setIsSoundOn] = useState(true);
            const [bgColor, setBgColor] = useState(COLORS[0]);
            const [streak, setStreak] = useState(0); 
            const [voices, setVoices] = useState([]);

            useEffect(() => {
                if (typeof window === 'undefined' || !('speechSynthesis' in window)) return;
                const loadVoices = () => {
                    try {
                        setVoices(window.speechSynthesis.getVoices());
                    } catch (e) { console.error(e); }
                };
                window.speechSynthesis.onvoiceschanged = loadVoices;
                loadVoices();
                return () => { if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = null; };
            }, []);

            const getDifficultyLevel = (currentStreak) => {
                if (currentStreak < 5) return [1];
                if (currentStreak < 15) return [1, 2];
                return [1, 2, 3];
            };

            const pickRandomItem = useCallback((targetMode, currentId = null, currentStreak = 0) => {
                let dataSet = DATA_SETS[targetMode];
               
                if (targetMode !== 'alphabet') {
                    const allowedLevels = getDifficultyLevel(currentStreak);
                    const filtered = dataSet.filter(item => allowedLevels.includes(item.level));
                    if (filtered.length > 0) dataSet = filtered;
                }

                let nextItem;
                let attempts = 0;
                do {
                    const randomIndex = Math.floor(Math.random() * dataSet.length);
                    nextItem = dataSet[randomIndex];
                    attempts++;
                } while (currentId && nextItem.id === currentId && attempts < 10);

                const randomColor = COLORS[Math.floor(Math.random() * COLORS.length)];

                setCurrentItem(nextItem);
                setBgColor(randomColor);
                setIsFlipped(false);
            }, []);

            const startMode = (selectedMode) => {
                setStreak(0);
                pickRandomItem(selectedMode, null, 0);
                setMode(selectedMode);
            };

            const goToMenu = () => {
                setMode('menu');
                setIsFlipped(false);
                setCurrentItem(null);
                setStreak(0);
            };

            const speak = (text) => {
                if (!isSoundOn || typeof window === 'undefined' || !('speechSynthesis' in window)) return;
                try {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    if (voices.length > 0) {
                        const englishVoice = voices.find(v => v.lang.includes('en-US') || v.lang.includes('en_US'));
                        if (englishVoice) utterance.voice = englishVoice;
                    }
                    window.speechSynthesis.speak(utterance);
                } catch (e) { console.error(e); }
            };

            const handleCardClick = () => {
                if (!currentItem) return;

                if (!isFlipped) {
                    setIsFlipped(true);
                    speak(currentItem.speakText);
                    if (mode !== 'alphabet') setStreak(prev => prev + 1);
                } else {
                    pickRandomItem(mode, currentItem.id, streak);
                }
            };

            const getFontSize = (text, isBack = false) => {
                if (!text) return 'text-4xl';
                const len = text.length;
                if (isBack && mode !== 'alphabet') {
                    if (len > 6) return 'text-3xl';
                    if (len > 4) return 'text-4xl';
                    return 'text-5xl';
                }
                if (len === 1) return 'text-[10rem]';
                if (len < 4) return 'text-7xl'; 
                if (len < 7) return 'text-6xl'; 
                if (len < 10) return 'text-5xl'; 
                return 'text-4xl';
            };

            const MenuButton = ({ modeKey, title, sub, icon: IconComponent, colorClass, borderColor }) => (
                <button 
                    onClick={() => startMode(modeKey)}
                    className={`group relative bg-white p-4 rounded-3xl shadow-md hover:shadow-xl transition-all active:scale-95 flex flex-col items-center justify-center gap-2 border-2 ${borderColor} h-40`}
                >
                    <div className={`${colorClass} p-3 rounded-2xl group-hover:scale-110 transition-transform`}>
                        <IconComponent className="text-white" size={32} />
                    </div>
                    <div className="text-center">
                        <div className="text-lg font-bold text-slate-700">{title}</div>
                        <div className="text-xs text-slate-400">{sub}</div>
                    </div>
                </button>
            );

            if (mode === 'menu') {
                return (
                    <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4 font-sans select-none">
                        <h1 className="text-3xl font-bold text-slate-600 mb-6 flex items-center gap-2">
                            <Icons.Star className="text-yellow-400 fill-yellow-400" size={32} />
                            えいごマスター
                            <Icons.Star className="text-yellow-400 fill-yellow-400" size={32} />
                        </h1>
                       
                        <div className="grid grid-cols-2 gap-4 w-full max-w-md">
                            <MenuButton modeKey="alphabet" title="ABC" sub="アルファベット" icon={Icons.Type} colorClass="bg-blue-400" borderColor="border-blue-100" />
                            <MenuButton modeKey="noun" title="めいし" sub="もののなまえ" icon={Icons.BookOpen} colorClass="bg-green-400" borderColor="border-green-100" />
                            <MenuButton modeKey="verb" title="どうし" sub="うごき" icon={Icons.Activity} colorClass="bg-orange-400" borderColor="border-orange-100" />
                            <MenuButton modeKey="adjective" title="ようす" sub="どんなかんじ？" icon={Icons.Smile} colorClass="bg-purple-400" borderColor="border-purple-100" />
                        </div>
                    </div>
                );
            }

            if (!currentItem) return <div className="min-h-screen bg-slate-100" />;

            const getModeName = () => {
                switch(mode) {
                    case 'alphabet': return 'アルファベット';
                    case 'noun': return 'めいし';
                    case 'verb': return 'どうし';
                    case 'adjective': return 'けいようし';
                    default: return '';
                }
            };

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-4 font-sans select-none overflow-hidden touch-none">
                    <div className="absolute top-4 w-full max-w-md flex justify-between items-center px-4 z-10">
                        <button onClick={goToMenu} className="p-3 rounded-full bg-white shadow-md active:scale-95 text-slate-500 hover:bg-slate-50">
                            <Icons.ArrowLeft size={24} />
                        </button>
                       
                        <div className="bg-white px-4 py-2 rounded-full shadow-sm text-slate-500 font-bold text-sm flex items-center gap-2">
                            {mode !== 'alphabet' && streak > 0 && (
                                <span className="flex items-center text-yellow-500 gap-1 mr-2">
                                    <Icons.Star size={16} className="fill-current" /> {streak}
                                </span>
                            )}
                            {getModeName()}
                        </div>

                        <button 
                            onClick={(e) => { e.stopPropagation(); setIsSoundOn(!isSoundOn); }}
                            className="p-3 rounded-full bg-white shadow-md active:scale-95 transition-transform"
                        >
                            {isSoundOn ? <Icons.Volume2 className="text-blue-500" /> : <Icons.VolumeX className="text-slate-400" />}
                        </button>
                    </div>

                    <div key={currentItem.id} className="perspective-1000 w-full max-w-xs aspect-[3/4] cursor-pointer mt-8 relative" onClick={handleCardClick}>
                        <div className={`relative w-full h-full duration-500 transform-style-3d transition-transform ${isFlipped ? 'rotate-y-180' : ''}`}>
                            <div className="absolute w-full h-full backface-hidden rounded-3xl shadow-2xl flex flex-col items-center justify-center bg-white border-4 border-white overflow-hidden">
                                <div className={`w-full h-full rounded-2xl flex flex-col items-center justify-center ${bgColor} bg-opacity-10 p-4 relative`}>
                                    {mode !== 'alphabet' && streak >= 15 && !isFlipped && (
                                        <div className="absolute top-4 right-4 text-yellow-400 animate-pulse"><Icons.Sparkles size={24} className="fill-current" /></div>
                                    )}
                                    <span className={`${getFontSize(currentItem.front)} font-bold pb-4 drop-shadow-sm ${bgColor.replace('bg-', 'text-')} text-center leading-tight break-words px-2`}>
                                        {currentItem.front}
                                    </span>
                                    {mode !== 'alphabet' && currentItem.emoji && (
                                        <span className="text-6xl mt-4 opacity-80 filter drop-shadow-md">{currentItem.emoji}</span>
                                    )}
                                </div>
                                <div className="absolute bottom-6 text-slate-400 font-bold animate-bounce text-sm">
                                    タップしてね
                                </div>
                            </div>

                            <div className="absolute w-full h-full backface-hidden rotate-y-180 rounded-3xl shadow-2xl flex flex-col items-center justify-center bg-white border-4 border-white overflow-hidden">
                                <div className="w-full h-full rounded-2xl flex flex-col items-center justify-center bg-slate-50 p-4">
                                    <span className="text-xl font-bold text-slate-400 absolute top-8">
                                        {mode === 'alphabet' ? `${currentItem.front} は...` : 'せいかいは...'}
                                    </span>
                                    <span className={`${getFontSize(currentItem.back, true)} font-bold pb-4 drop-shadow-sm ${bgColor.replace('bg-', 'text-')} text-center px-2`}>
                                        {currentItem.back}
                                    </span>
                                    <div className="absolute bottom-8 px-8 py-3 bg-blue-500 text-white rounded-full font-bold shadow-lg active:scale-95 transition-transform hover:bg-blue-600">
                                        つぎへ
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
